global:
  resolve_timeout: 5m

route:
  group_by: ['container']        # 🔥 只按容器分组
  group_wait: 30s                # 等30秒聚合
  group_interval: 5m             # 5分钟内不重复发
  repeat_interval: 30m           # 30分钟才重复提醒

  receiver: 'email-notifications'

receivers:
  - name: 'email-notifications'
    email_configs:
      - to: '1769250028@qq.com'
        from: '1769250028@qq.com'
        smarthost: 'smtp.qq.com:587'
        auth_username: '1769250028@qq.com'
        auth_password: 'vztcabveuaxdbiff'
        require_tls: true

        headers:
          Subject: '[容器告警] {{ .GroupLabels.container }} ({{ .Alerts | len }}条)'

        html: |
          <div style="font-family:Arial,'Microsoft YaHei',sans-serif;background:#f4f6fb;padding:24px;color:#1f2937;">
            <div style="max-width:760px;margin:0 auto;background:#ffffff;border-radius:14px;border:1px solid #e5e7eb;overflow:hidden;">
              <div style="background:#1f2937;color:#ffffff;padding:22px 28px;">
                <div style="font-size:22px;font-weight:bold;">容器监控告警</div>
                <div style="font-size:13px;margin-top:8px;color:#cbd5e1;">eBPF Container Monitor</div>
              </div>

              <div style="padding:24px 28px;">
                <div style="display:flex;gap:16px;margin-bottom:20px;">
                  <div style="flex:1;background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:14px;">
                    <div style="font-size:13px;color:#64748b;">容器</div>
                    <div style="font-size:20px;font-weight:bold;margin-top:6px;">{{ .GroupLabels.container }}</div>
                  </div>
                  <div style="flex:1;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:14px;">
                    <div style="font-size:13px;color:#9a3412;">告警数量</div>
                    <div style="font-size:20px;font-weight:bold;margin-top:6px;color:#ea580c;">{{ len .Alerts }} 条</div>
                  </div>
                </div>

                {{ range .Alerts }}
                <div style="border:1px solid #fecaca;border-radius:12px;margin-bottom:16px;overflow:hidden;">
                  <div style="background:#fee2e2;color:#991b1b;padding:12px 16px;font-weight:bold;">
                    严重告警：{{ .Labels.alertname }}
                  </div>
                  <div style="padding:16px;background:#ffffff;line-height:1.7;">
                    <div><b>摘要：</b>{{ .Annotations.summary }}</div>
                    <div><b>说明：</b>{{ .Annotations.description }}</div>
                    <div><b>开始时间：</b>{{ .StartsAt }}</div>
                  </div>
                </div>
                {{ end }}

                <div style="margin-top:20px;padding:14px;background:#f8fafc;border-radius:10px;color:#64748b;font-size:13px;">
                  请根据告警容器进入 Grafana 查看对应容器详情。
                </div>
              </div>
            </div>
          </div>
