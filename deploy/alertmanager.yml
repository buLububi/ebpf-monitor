global:
  smtp_smarthost: 'smtp.qq.com:587'
  smtp_from: '1769250028@qq.com'
  smtp_auth_username: '1769250028@qq.com'
  smtp_auth_password: 'vztcabveuaxdbiff'
  smtp_require_tls: true

route:
  receiver: 'email-alert'
  group_by: ['container']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

receivers:
- name: 'email-alert'
  email_configs:
  - to: '1769250028@qq.com'
    send_resolved: true
    headers:
      Subject: '【容器监控告警】【{{ .CommonLabels.severity }}】{{ .CommonLabels.container }} - {{ .CommonLabels.alertname }}'
    html: |
      <html>
      <body style="margin:0;padding:0;background:#f5f7fa;font-family:'Microsoft YaHei',Arial,sans-serif;">
        <div style="max-width:920px;margin:24px auto;background:#ffffff;border:1px solid #ebeef5;border-radius:10px;overflow:hidden;">
          
          <div style="padding:20px 24px;background:linear-gradient(135deg,#1f2d3d,#324057);color:#fff;">
            <div style="font-size:24px;font-weight:700;">容器监控告警通知</div>
            <div style="margin-top:8px;font-size:13px;opacity:0.9;">
              来源：eBPF Container Monitor ｜ 时区：北京时间（Asia/Shanghai）
            </div>
          </div>

          <div style="padding:20px 24px;background:#fafafa;border-bottom:1px solid #ebeef5;">
            <table style="width:100%;border-collapse:collapse;font-size:14px;color:#303133;">
              <tr>
                <td style="padding:6px 0;width:120px;"><b>容器</b></td>
                <td style="padding:6px 0;">{{ .CommonLabels.container }}</td>
              </tr>
              <tr>
                <td style="padding:6px 0;"><b>角色</b></td>
                <td style="padding:6px 0;">{{ .CommonLabels.container_role }}</td>
              </tr>
              <tr>
                <td style="padding:6px 0;"><b>告警数量</b></td>
                <td style="padding:6px 0;">{{ len .Alerts }}</td>
              </tr>
              <tr>
                <td style="padding:6px 0;"><b>分组键</b></td>
                <td style="padding:6px 0;">container + alertname</td>
              </tr>
            </table>
          </div>

          <div style="padding:20px 24px;">
            {{ range .Alerts }}
            <div style="margin-bottom:18px;border:1px solid #ebeef5;border-radius:8px;overflow:hidden;">
              
              {{ if eq .Labels.severity "严重" }}
              <div style="padding:12px 16px;background:#fde2e2;color:#c45656;font-weight:700;">
                严重告警
              </div>
              {{ else if eq .Labels.severity "警告" }}
              <div style="padding:12px 16px;background:#faecd8;color:#e6a23c;font-weight:700;">
                警告告警
              </div>
              {{ else }}
              <div style="padding:12px 16px;background:#ecf5ff;color:#409eff;font-weight:700;">
                一般告警
              </div>
              {{ end }}

              <div style="padding:16px;background:#fff;">
                <table style="width:100%;border-collapse:collapse;font-size:14px;color:#303133;">
                  <tr>
                    <td style="padding:8px 0;width:120px;"><b>告警名</b></td>
                    <td style="padding:8px 0;">{{ .Labels.alertname }}</td>
                  </tr>
                  <tr>
                    <td style="padding:8px 0;"><b>摘要</b></td>
                    <td style="padding:8px 0;">{{ .Annotations.summary }}</td>
                  </tr>
                  <tr>
                    <td style="padding:8px 0;"><b>说明</b></td>
                    <td style="padding:8px 0;">{{ .Annotations.description }}</td>
                  </tr>
                  <tr>
                    <td style="padding:8px 0;"><b>级别</b></td>
                    <td style="padding:8px 0;">{{ .Labels.severity }}</td>
                  </tr>
                  <tr>
                    <td style="padding:8px 0;"><b>开始时间</b></td>
                    <td style="padding:8px 0;">{{ .StartsAt }}</td>
                  </tr>
                  <tr>
                    <td style="padding:8px 0;"><b>Grafana</b></td>
                    <td style="padding:8px 0;">
                      <a href="http://127.0.0.1:3000/d/container-classified-final"
                         style="display:inline-block;padding:8px 14px;background:#409eff;color:#fff;text-decoration:none;border-radius:6px;">
                        查看监控面板
                      </a>
                    </td>
                  </tr>
                </table>
              </div>
            </div>
            {{ end }}
          </div>

          <div style="padding:14px 24px;background:#fafafa;color:#909399;font-size:12px;border-top:1px solid #ebeef5;">
            本邮件由 Alertmanager 自动发送，请勿直接回复。
          </div>
        </div>
      </body>
      </html>