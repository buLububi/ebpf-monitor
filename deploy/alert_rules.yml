groups:
  - name: ebpf_container_dynamic_alerts
    interval: 15s
    rules:
      - alert: 容器CPU动态异常
        expr: |
          rate(container_cpu_usage_usec[1m])
          >
          (
            avg_over_time(rate(container_cpu_usage_usec[1m])[30m:1m] offset 10m)
            +
            3 * stddev_over_time(rate(container_cpu_usage_usec[1m])[30m:1m] offset 10m)
          )
        for: 3m
        labels:
          severity: 严重
        annotations:
          summary: "容器CPU动态异常"
          description: "当前CPU活跃度连续超过历史动态阈值。阈值基于10分钟前开始的30分钟历史窗口计算，避免压测期间阈值跟随抬高。"

      - alert: 容器IO平均延迟动态异常
        expr: |
          container_io_latency_avg_us
          >
          (
            avg_over_time(container_io_latency_avg_us[30m] offset 10m)
            +
            3 * stddev_over_time(container_io_latency_avg_us[30m] offset 10m)
          )
        for: 3m
        labels:
          severity: 严重
        annotations:
          summary: "容器IO平均延迟动态异常"
          description: "当前IO平均延迟连续超过历史动态阈值。阈值基于10分钟前开始的30分钟历史窗口计算。"

      - alert: 容器IO最大延迟动态异常
        expr: |
          container_io_latency_max_us
          >
          (
            avg_over_time(container_io_latency_max_us[30m] offset 10m)
            +
            3 * stddev_over_time(container_io_latency_max_us[30m] offset 10m)
          )
        for: 3m
        labels:
          severity: 严重
        annotations:
          summary: "容器IO最大延迟动态异常"
          description: "当前IO最大延迟连续超过历史动态阈值。阈值基于10分钟前开始的30分钟历史窗口计算。"

      - alert: 容器调度最大延迟动态异常
        expr: |
          container_sched_latency_max_us
          >
          (
            avg_over_time(container_sched_latency_max_us[30m] offset 10m)
            +
            3 * stddev_over_time(container_sched_latency_max_us[30m] offset 10m)
          )
        for: 3m
        labels:
          severity: 严重
        annotations:
          summary: "容器调度最大延迟动态异常"
          description: "当前调度最大延迟连续超过历史动态阈值。阈值基于10分钟前开始的30分钟历史窗口计算。"
