global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "host.docker.internal:9093"

scrape_configs:
  - job_name: 'ebpf_container_cpu_mem'
    static_configs:
      - targets: ['host.docker.internal:19100']
    
  - job_name: 'ebpf_container_io'
    static_configs:
      - targets: ['host.docker.internal:2114']
 
